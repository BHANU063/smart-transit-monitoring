<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SmartTransit - Real-time Bus Tracking and Crowd Monitoring">
    <title>SmartTransit | Real-time Monitoring</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS for Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <header class="glass-panel">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/>
                <circle cx="7" cy="17" r="2"/>
                <path d="M9 17h6"/>
                <circle cx="17" cy="17" r="2"/>
            </svg>
            <h1>SmartTransit</h1>
        </div>
        <nav>
            <button class="nav-btn active" id="nav-dashboard">Dashboard</button>
            <button class="nav-btn" id="nav-map">Map View</button>
            <button class="nav-btn" id="theme-toggle" aria-label="Toggle Theme">
                <svg id="theme-icon" class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
        </nav>
    </header>

    <main>
        <!-- Dashboard View -->
        <div id="dashboard-view">
            <section class="overview-section">
                <div class="glass-panel stat-card">
                    <h3>Active Buses</h3>
                    <p id="active-buses-count" class="stat-value">0</p>
                </div>
                <div class="glass-panel stat-card">
                    <h3>System Status</h3>
                    <p class="stat-value status-online">Online</p>
                </div>
                <div class="glass-panel stat-card">
                    <h3>Smart Recommendation</h3>
                    <div id="recommendation-content" class="recommendation-box">
                        Analyzing routes...
                    </div>
                </div>
            </section>

            <section class="buses-section">
                <h2 class="section-title">Live Tracking</h2>
                <div id="buses-container" class="buses-grid">
                    <!-- Bus cards will be injected here via JS -->
                </div>
            </section>
        </div>

        <!-- Map View -->
        <div id="map-view" style="display: none;">
            <section class="map-section">
                <h2 class="section-title">Live Map Tracker</h2>
                <div class="glass-panel map-container-wrapper">
                    <div id="map"></div>
                </div>
            </section>
        </div>
    </main>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="app.js"></script>
</body>
</html>
